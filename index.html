<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkVault — The Internet's Best Resources</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1c1c28;
    --card: #181824;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --accent: #f5c842;
    --accent2: #ff6b4a;
    --text: #f0eee8;
    --muted: #8a8898;
    --muted2: #5a5a72;
    --radius: 14px;
    --radius-sm: 8px;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    padding: 80px 40px 60px;
    text-align: center;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -120px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(245,200,66,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-block;
    background: rgba(245,200,66,0.1);
    border: 1px solid rgba(245,200,66,0.25);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 24px;
  }
  h1 {
    font-family: var(--font-head);
    font-size: clamp(42px, 7vw, 88px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 20px;
  }
  h1 span { color: var(--accent); }
  .hero-sub {
    color: var(--muted);
    font-size: 17px;
    max-width: 480px;
    margin: 0 auto 40px;
    font-weight: 300;
  }

  /* ── SEARCH ── */
  .search-wrap {
    max-width: 560px;
    margin: 0 auto 20px;
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 18px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted2);
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 100px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    padding: 14px 20px 14px 50px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search::placeholder { color: var(--muted2); }
  #search:focus {
    border-color: rgba(245,200,66,0.4);
    box-shadow: 0 0 0 4px rgba(245,200,66,0.07);
  }
  .search-count {
    font-size: 12px;
    color: var(--muted2);
    text-align: center;
    margin-top: 10px;
    height: 16px;
  }

  /* ── STATS BAR ── */
  .stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 28px 40px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin: 0 0 0;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    display: block;
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
    margin-top: 4px;
  }

  /* ── LAYOUT ── */
  .main { max-width: 1280px; margin: 0 auto; padding: 0 28px 80px; }

  /* ── CATEGORY TABS ── */
  .tabs-wrap {
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(16px);
    padding: 16px 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 0 4px;
    scrollbar-width: none;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 28px;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    transition: all 0.18s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover { border-color: var(--border2); color: var(--text); }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0f;
    font-weight: 700;
  }
  .tab .tab-count {
    background: rgba(0,0,0,0.15);
    border-radius: 100px;
    font-size: 10px;
    padding: 1px 7px;
    font-weight: 600;
  }
  .tab.active .tab-count { background: rgba(0,0,0,0.2); }

  /* ── SECTION ── */
  .section { margin-top: 56px; }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 24px;
  }
  .section-title {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .icon { font-size: 20px; }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-count {
    font-size: 12px;
    color: var(--muted2);
    font-weight: 500;
  }

  /* ── CARD GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color 0.18s, transform 0.18s, background 0.18s;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.4s ease both;
  }
  .card:hover {
    border-color: var(--border2);
    background: #1e1e2e;
    transform: translateY(-2px);
  }
  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .card-favicon {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .card-favicon img { width: 22px; height: 22px; object-fit: contain; }
  .card-actions {
    display: flex;
    gap: 6px;
    align-items: center;
    opacity: 0;
    transition: opacity 0.18s;
  }
  .card:hover .card-actions { opacity: 1; }
  .card-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 5px 8px;
    transition: all 0.15s;
    line-height: 1;
  }
  .card-btn:hover { border-color: var(--border2); color: var(--text); }
  .card-btn.fav-btn.active { color: var(--accent); border-color: rgba(245,200,66,0.3); }

  .card-name {
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin: 0;
  }
  .card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    flex: 1;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }
  .card-tag {
    font-size: 11px;
    color: var(--muted2);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 3px 10px;
    font-weight: 500;
  }
  .visit-btn {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    text-decoration: none;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .visit-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0f;
  }
  .visit-btn svg { width: 10px; height: 10px; }

  /* ── FAVORITES SECTION ── */
  #favSection { display: none; }
  #favSection.visible { display: block; }

  /* ── NO RESULTS ── */
  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    display: none;
  }
  .no-results.visible { display: block; }
  .no-results-icon { font-size: 48px; margin-bottom: 16px; }
  .no-results h3 { font-family: var(--font-head); font-size: 20px; color: var(--text); margin-bottom: 8px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 100px;
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 22px;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 36px 40px;
    text-align: center;
    color: var(--muted2);
    font-size: 13px;
  }
  footer a { color: var(--accent); text-decoration: none; }

  /* ── ANIM ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .hero { padding: 52px 20px 40px; }
    h1 { font-size: 48px; }
    .stats { gap: 24px; padding: 20px; }
    .stat-num { font-size: 22px; }
    .main { padding: 0 16px 60px; }
  }

  .copied { color: var(--accent) !important; }
</style>
</head>

const CATEGORIES = [...new Set(LINKS.map(l => l.cat))];
const CAT_ICONS = {
  "AI Tools":"🤖","Developer Tools":"💻","Design":"🎨","Productivity":"⚡","Learning":"🎓",
  "Writing":"✍️","Finance":"📈","Research":"🔬","Utilities":"🔧","Media":"🎬","Health":"🏃","News":"📰"
};

let favorites = JSON.parse(localStorage.getItem('lv-favs') || '[]');
let activeTab = 'All';
let searchQuery = '';

// ── BUILD TABS ──
function buildTabs() {
  const tabs = document.getElementById('tabs');
  const allTab = makeTab('All', LINKS.length);
  tabs.appendChild(allTab);
  const favTab = makeTab('★ Favorites', favorites.length);
  favTab.dataset.cat = 'Favorites';
  tabs.appendChild(favTab);
  CATEGORIES.forEach(cat => {
    const count = LINKS.filter(l=>l.cat===cat).length;
    tabs.appendChild(makeTab(cat, count));
  });
}

function makeTab(label, count) {
  const btn = document.createElement('button');
  btn.className = 'tab' + (label === 'All' ? ' active' : '');
  btn.dataset.cat = label;
  btn.innerHTML = `${label} <span class="tab-count">${count}</span>`;
  btn.addEventListener('click', () => switchTab(label));
  return btn;
}

function switchTab(cat) {
  activeTab = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat===cat));
  render();
}

// ── BUILD SECTIONS ──
function buildSections() {
  const container = document.getElementById('sections');
  container.innerHTML = '';
  const query = searchQuery.toLowerCase();

  let totalVisible = 0;
  let sectionsToShow = activeTab === 'All' ? CATEGORIES :
                       activeTab === 'Favorites' ? [] : [activeTab];

  if (activeTab === 'Favorites') {
    renderFavSection(query);
    document.getElementById('noResults').classList.toggle('visible', favorites.length === 0 && !query);
    return;
  }

  renderFavSection(''); // hide in non-fav mode
  document.getElementById('favSection').classList.toggle('visible', favorites.length > 0 && activeTab === 'All' && !query);

  sectionsToShow.forEach(cat => {
    let items = LINKS.filter(l => l.cat === cat);
    if (query) items = items.filter(l =>
      l.name.toLowerCase().includes(query) ||
      l.desc.toLowerCase().includes(query) ||
      l.cat.toLowerCase().includes(query)
    );
    if (!items.length) return;
    totalVisible += items.length;

    const sec = document.createElement('section');
    sec.className = 'section';
    sec.innerHTML = `
      <div class="section-header">
        <h2 class="section-title"><span class="icon">${CAT_ICONS[cat]||'📌'}</span>${cat}</h2>
        <div class="section-line"></div>
        <span class="section-count">${items.length} links</span>
      </div>
      <div class="grid" id="grid-${cat.replace(/\s+/g,'-')}"></div>
    `;
    container.appendChild(sec);
    const grid = sec.querySelector('.grid');
    items.forEach((item, i) => {
      const card = buildCard(item);
      card.style.animationDelay = (i * 30) + 'ms';
      grid.appendChild(card);
    });
  });

  if (query) {
    document.getElementById('searchCount').textContent = `${totalVisible} result${totalVisible!==1?'s':''} found`;
  } else {
    document.getElementById('searchCount').textContent = '';
  }
  document.getElementById('noResults').classList.toggle('visible', totalVisible === 0);
}

function renderFavSection(query) {
  const sec = document.getElementById('favSection');
  const grid = document.getElementById('favGrid');
  grid.innerHTML = '';
  const items = LINKS.filter(l => favorites.includes(l.url));
  sec.classList.toggle('visible', items.length > 0 && activeTab !== 'Favorites' ? !query : activeTab === 'Favorites');
  if (activeTab === 'Favorites') {
    items.forEach((item, i) => {
      const card = buildCard(item);
      card.style.animationDelay = (i*30)+'ms';
      grid.appendChild(card);
    });
    document.getElementById('noResults').classList.toggle('visible', items.length===0);
  }
}

function buildCard(item) {
  const isFav = favorites.includes(item.url);
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <div class="card-top">
      <div class="card-favicon">
        <img src="${item.favicon}" alt="" loading="lazy" onerror="this.parentNode.textContent='${item.icon}'">
      </div>
      <div class="card-actions">
        <button class="card-btn fav-btn${isFav?' active':''}" data-url="${item.url}" title="${isFav?'Remove from favorites':'Add to favorites'}">
          ${isFav ? '★' : '☆'}
        </button>
        <button class="card-btn copy-btn" data-url="${item.url}" title="Copy link">⧉</button>
      </div>
    </div>
    <p class="card-name">${item.name}</p>
    <p class="card-desc">${item.desc}</p>
    <div class="card-footer">
      <span class="card-tag">${item.cat}</span>
      <a class="visit-btn" href="${item.url}" target="_blank" rel="noopener noreferrer">
        Visit
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M7 17 17 7M7 7h10v10"/></svg>
      </a>
    </div>
  `;

  div.querySelector('.fav-btn').addEventListener('click', (e) => {
    e.preventDefault();
    toggleFav(item.url);
  });
  div.querySelector('.copy-btn').addEventListener('click', (e) => {
    e.preventDefault();
    navigator.clipboard.writeText(item.url).then(() => {
      const btn = e.currentTarget;
      btn.textContent = '✓';
      btn.classList.add('copied');
      showToast(`Copied ${item.name} link!`);
      setTimeout(() => { btn.textContent='⧉'; btn.classList.remove('copied'); }, 1500);
    });
  });
  return div;
}

function toggleFav(url) {
  if (favorites.includes(url)) {
    favorites = favorites.filter(f=>f!==url);
    showToast('Removed from favorites');
  } else {
    favorites.push(url);
    showToast('Added to favorites ★');
  }
  localStorage.setItem('lv-favs', JSON.stringify(favorites));
  updateFavCount();
  render();
}

function updateFavCount() {
  const favTab = document.querySelector('.tab[data-cat="★ Favorites"]');
  if (favTab) favTab.querySelector('.tab-count').textContent = favorites.length;
}

function render() { buildSections(); }

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── SEARCH ──
let debounceTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    if (searchQuery && activeTab === 'Favorites') switchTab('All');
    render();
  }, 180);
});

// ── INIT ──
buildTabs();
render();
</script>
